<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JY Martineau</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #05080e; --surface: #0b0f18; --border: #1e2a3a;
  --text: #e2eaf4; --text-dim: #7d8fa8; --text-muted: #4a5a72;
  --blue: #4f8ef7; --blue-glow: #4f8ef730; --teal: #20c997;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg); color: var(--text);
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
}
body::before {
  content: ""; position: fixed; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 800px 500px at 20% 50%, #4f8ef708 0%, transparent 65%),
    radial-gradient(ellipse 600px 400px at 80% 30%, #20c99706 0%, transparent 65%);
  animation: drift 20s ease-in-out infinite alternate;
}
@keyframes drift { 0% { transform: translate(0,0); } 100% { transform: translate(-30px,20px); } }
.wrap { text-align: center; padding: 2rem 2rem; position: relative; max-width: 40rem; width: 100%; }
.eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--teal); margin-bottom: 1.25rem;
  display: flex; align-items: center; justify-content: center; gap: 0.6rem;
  flex-wrap: wrap;
}
.eyebrow::before, .eyebrow::after {
  content: ""; display: inline-block; width: 1.5rem; height: 1px; background: var(--teal);
  flex-shrink: 0;
}
h1 {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: clamp(3.5rem, 10vw, 5.5rem);
  font-weight: 700;
  letter-spacing: 0.01em;
  line-height: 1.05;
  white-space: nowrap;
  background: linear-gradient(135deg, #f0f4ff 0%, #8ca8d4 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 0.625rem;
}
.title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.775rem; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--blue); margin-bottom: 0.875rem;
}
.domains {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem; color: var(--text-muted);
  margin-bottom: 2.5rem; line-height: 2;
  letter-spacing: 0.02em;
}
.divider {
  width: 3rem; height: 1px; background: var(--border);
  margin: 0 auto 2.5rem;
}
.links { display: flex; gap: 1rem; justify-content: center; align-items: center; flex-wrap: wrap; }
.li-btn {
  display: inline-flex; align-items: center; gap: 0.5rem;
  padding: 0.6rem 1.25rem;
  background: transparent; border: 1px solid #0a66c2;
  border-radius: 0.375rem; color: #5b9bd5;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; font-weight: 600; letter-spacing: 0.05em;
  text-decoration: none; transition: all 0.2s;
}
.li-btn:hover { background: #0a66c220; color: #7ab4e8; border-color: #5b9bd5; }
.li-btn svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Ottawa &middot; Toronto &middot; Los Angeles &middot; New York City</div>
  <h1>JY Martineau</h1>
  <div class="title">CTO &amp; Entrepreneur</div>
  <div class="domains">
    Fintech &nbsp;&middot;&nbsp; Blockchain &nbsp;&middot;&nbsp; AI &nbsp;&middot;&nbsp; SaaS<br>
    eCommerce &nbsp;&middot;&nbsp; Gaming &nbsp;&middot;&nbsp; Entertainment
  </div>
  <div class="divider"></div>
  <div class="links">
    <a href="https://www.linkedin.com/in/jymartineau/" class="li-btn" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
      </svg>
      LinkedIn
    </a>
  </div>
</div>
</body>
</html>
