<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JY Martineau</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #05080e; --surface: #0b0f18; --border: #1e2a3a;
  --text: #e2eaf4; --text-dim: #7d8fa8; --text-muted: #4a5a72;
  --blue: #4f8ef7; --blue-glow: #4f8ef730; --teal: #20c997;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Syne', sans-serif;
  background: var(--bg); color: var(--text);
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
}
body::before {
  content: ""; position: fixed; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 800px 500px at 20% 50%, #4f8ef708 0%, transparent 65%),
    radial-gradient(ellipse 600px 400px at 80% 30%, #20c99706 0%, transparent 65%);
  animation: drift 20s ease-in-out infinite alternate;
}
@keyframes drift { 0% { transform: translate(0,0); } 100% { transform: translate(-30px,20px); } }
.wrap { text-align: center; padding: 2rem; position: relative; max-width: 32rem; }
.eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem; font-weight: 600;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--teal); margin-bottom: 1.5rem;
  display: flex; align-items: center; justify-content: center; gap: 0.75rem;
}
.eyebrow::before, .eyebrow::after {
  content: ""; display: inline-block; width: 2rem; height: 1px; background: var(--teal);
}
h1 {
  font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 800;
  letter-spacing: -0.04em; line-height: 1;
  background: linear-gradient(135deg, var(--text) 0%, #7a98c0 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 1rem;
}
.sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem; color: var(--text-muted); margin-bottom: 2.5rem; line-height: 1.8;
}
.sub span { color: var(--text-dim); }
.divider {
  width: 3rem; height: 1px; background: var(--border);
  margin: 0 auto 2.5rem;
}
.links { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; }
.link {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em;
  color: var(--text-muted); text-decoration: none; transition: color 0.2s;
}
.link:hover { color: var(--blue); }
.registry-btn {
  display: inline-flex; align-items: center; gap: 0.5rem;
  padding: 0.625rem 1.25rem;
  background: transparent; border: 1px solid var(--border);
  border-radius: 0.375rem; color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; font-weight: 600; letter-spacing: 0.05em;
  text-decoration: none; transition: all 0.2s;
}
.registry-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-glow); }
.registry-btn svg { width: 12px; height: 12px; fill: currentColor; }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Ottawa &middot; Toronto</div>
  <h1>JY Martineau</h1>
  <p class="sub">
    <span>Fractional CTO</span><br>
    Fintech &middot; Blockchain &middot; AI &middot; SaaS<br>
    miner media co
  </p>
  <div class="divider"></div>
  <div class="links">
    <a href="https://jymartineau.github.io/tech-registry/" class="registry-btn">
      <svg viewBox="0 0 16 16"><path d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 110-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.75.75 0 01-1.072 1.05A2.495 2.495 0 012 11.5v-9zm10.5-1V9h-8c-.356 0-.694.074-1 .208V2.5a1 1 0 011-1h8z"/></svg>
      Tech Registry
    </a>
    <a href="https://www.linkedin.com/in/jymartineau/" class="link" target="_blank" rel="noopener">LinkedIn</a>
    <a href="https://github.com/jymartineau" class="link" target="_blank" rel="noopener">GitHub</a>
    <a href="https://twitter.com/jymartineau" class="link" target="_blank" rel="noopener">X</a>
  </div>
</div>
</body>
</html>
